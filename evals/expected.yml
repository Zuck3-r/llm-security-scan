# Eval ケースの期待値定義 (CLAUDE.md §9 Step 2)。
#
# - case: <id>。evals/cases/<id>.diff と対応する。
# - expect_verdict: confirmed | dismissed | inconclusive
#     confirmed   : 該当観点に triage_status=confirmed が >=1、最高 confidence
#                   が expect_min_confidence 以上であること。
#     dismissed   : 該当観点に triage_status=confirmed が 1 件も無いこと。
#                   (validator で弾かれた / LLM 検出なし / triage が dismissed
#                    化、いずれも OK)
#     inconclusive: 該当観点に triage_status=inconclusive が >=1。
# - expect_perspective: 観点 id (xss / injection / authn / csrf / authz_vertical /
#                       authz_horizontal / secrets / ssrf_path /
#                       business_logic / file_inclusion)。
# - expect_min_confidence: confirmed のときのみ意味あり。default 0.0。
#
# 新規ケースは replays/ から「答案確定」できたものを cases/ にコピーして
# ここに 1 行追加するワークフロー (CLAUDE.md §9 Step 2 末尾)。

- case:                   001-xss-real
  expect_verdict:         confirmed
  expect_perspective:     xss
  expect_min_confidence:  0.7

- case:                   002-xss-fp
  expect_verdict:         dismissed
  expect_perspective:     xss

