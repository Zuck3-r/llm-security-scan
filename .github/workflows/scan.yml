name: LLM Security Scan

on:
  workflow_call:
    inputs:
      overrides_path:
        description: "プロジェクト固有の perspectives / triage_prompts を置いたディレクトリ (caller リポ内)"
        type: string
        default: ""
      perspectives_disabled:
        description: "無効化する perspective id (comma 区切り。例: 'secrets,xss')"
        type: string
        default: ""
      # ── スキャン対象の絞り込み (ブラックリスト方式) ────────────────
      # 設計方針: default では「全部見る」。明らかにランタイムに載らない
      # 拡張子 (md / json / lock / 画像 等) だけを default で除外する。
      # 新しい言語 (Go / Ruby / Java / PHP 等) は何もしなくても対象に入る (fail-safe)。
      # `.env` は意図的に除外していない: 誤コミットされた secrets を検出する観点で価値が高い。
      scan_exclude_extensions:
        description: |
          diff から除外する拡張子 (CSV, ドット無し)。default はランタイムに
          載らないファイル (md/markdown/txt/rst/yml/yaml/json/jsonc/lock/toml/cfg/
          ini/gitignore/dockerignore/editorconfig/svg/png/jpg/jpeg/gif/webp/ico/
          pdf/csv/tsv)。`.env` は意図的に含めていない (secrets 検出のため)。
        type: string
        default: "md,markdown,txt,rst,yml,yaml,json,jsonc,lock,toml,cfg,ini,gitignore,dockerignore,editorconfig,svg,png,jpg,jpeg,gif,webp,ico,pdf,csv,tsv"
      scan_extra_excludes:
        description: |
          追加の git pathspec 除外 (空白区切り)。例: `':(exclude)docs/**' ':(exclude)scripts/**'`
          プロジェクト固有のディレクトリを除外したい場合に。
        type: string
        default: ""
      # ── プロジェクト固有の文脈 ────────────────────────────────
      context_path:
        description: |
          SECURITY-CONTEXT markdown へのパス (caller repo 内)。
          指定すると全 LLM 呼び出し (スキャン + トリアージ) の system prompt
          末尾に注入される。内製 framework の認証 decorator 名や独自 sanitizer の
          説明を書いて誤検知を抑える。未指定なら overrides_path/SECURITY-CONTEXT.md
          を fallback で見る。両方無ければ context 注入なし。
        type: string
        default: ""
      max_low_per_perspective:
        description: "Low severity の triage 上限 (rest は status=raw)"
        type: number
        default: 3
      triage_enabled:
        description: "弁証法的トリアージを有効にするか"
        type: boolean
        default: true
      debate_rounds:
        description: |
          弁証法的トリアージのラウンド数。1 (default) = Attacker/Defender/Judge
          を 1 回。2 = Round 1 の verdict が inconclusive の finding にだけ
          Attacker_rebut/Defender_rebut/Judge を追加で 1 ラウンド回す。
          confirmed/dismissed には適用しない (コスト最適化)。
        type: number
        default: 1
    secrets:
      OPENAI_API_KEY:
        required: false
      GCP_SA_KEY:
        required: false
      GEMINI_API_KEY:
        required: false

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents:       read
      pull-requests:  write
      id-token:       write
    steps:
      # 1) caller のリポジトリ
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) このツール自身を同じ ref で .llm-security-scan/ にチェックアウト
      #
      # 注意: reusable workflow 内では `github.workflow_ref` は caller 側の
      # workflow ref を指してしまう (例: caller の PR トリガなら
      # `refs/pull/N/merge`)。`Zuck3-r/llm-security-scan` repo にその ref は
      # 存在しないため checkout が失敗する。
      # 代わりに OIDC token の `job_workflow_ref` クレームを使う。
      # これは「現在実行中の reusable workflow 自身」が呼ばれた ref を返す。
      # 必要権限: id-token: write (本ジョブの permissions で許可済み)
      - name: Resolve workflow ref (via OIDC job_workflow_ref)
        id: tool_ref
        run: |
          set -euo pipefail
          TOKEN=$(curl -sLS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=llm-security-scan" \
            | python3 -c 'import sys,json;print(json.load(sys.stdin)["value"])')
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          # base64url padding を復元
          while [ $(( ${#PAYLOAD} % 4 )) -ne 0 ]; do PAYLOAD="${PAYLOAD}="; done
          JOB_REF=$(echo "$PAYLOAD" | tr '_-' '/+' | base64 -d \
            | python3 -c 'import sys,json;print(json.load(sys.stdin)["job_workflow_ref"])')
          # job_workflow_ref = "<owner>/llm-security-scan/.github/workflows/scan.yml@<ref>"
          echo "ref=${JOB_REF##*@}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: Zuck3-r/llm-security-scan
          ref:        ${{ steps.tool_ref.outputs.ref }}
          path:       .llm-security-scan

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3) diff 計算 (ブラックリスト方式)
      #
      # default で「全部見る」。`scan_exclude_extensions` で明らかに無意味な
      # 拡張子だけ除外。固定の path-based 除外 (tests/dist/build/node_modules ...)
      # は維持。新しい言語が出ても何もしなくても対象に入る (fail-safe)。
      - name: Compute diff
        id: diff
        env:
          BASE_REF:        ${{ github.base_ref }}
          EXCLUDE_EXTS:    ${{ inputs.scan_exclude_extensions }}
          EXTRA_EXCLUDES:  ${{ inputs.scan_extra_excludes }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/scan
          DIFF_FILE=/tmp/scan/diff.patch

          # 拡張子ベースの :(exclude) を組み立て
          EXCL=()
          IFS=',' read -ra EXTS <<< "$EXCLUDE_EXTS"
          for ext in "${EXTS[@]}"; do
            ext="$(echo "$ext" | xargs)"
            [ -z "$ext" ] && continue
            EXCL+=(":(exclude)**/*.${ext}")
          done
          # caller 由来の追加 pathspec exclude
          for p in $EXTRA_EXCLUDES; do EXCL+=("$p"); done

          # 全てのファイルを対象に diff を取り、ブラックリストで除外
          git diff "origin/${BASE_REF}...HEAD" -- . \
            "${EXCL[@]}" \
            ':(exclude)**/*.d.ts' \
            ':(exclude)package-lock.json' \
            ':(exclude)**/package-lock.json' \
            ':(exclude)**/yarn.lock' \
            ':(exclude)**/pnpm-lock.yaml' \
            ':(exclude)**/poetry.lock' \
            ':(exclude)**/Cargo.lock' \
            ':(exclude)**/Gemfile.lock' \
            ':(exclude)**/go.sum' \
            ':(exclude)**/node_modules/**' \
            ':(exclude)**/vendor/**' \
            ':(exclude)**/dist/**' \
            ':(exclude)**/build/**' \
            ':(exclude)**/out/**' \
            ':(exclude)**/.next/**' \
            ':(exclude)**/.nuxt/**' \
            ':(exclude)**/coverage/**' \
            ':(exclude)**/__pycache__/**' \
            ':(exclude)**/tests/**' \
            ':(exclude)**/__tests__/**' \
            ':(exclude)**/test_*.py' \
            ':(exclude)**/*_test.py' \
            ':(exclude)**/*_test.go' \
            ':(exclude)**/*.test.ts' \
            ':(exclude)**/*.test.tsx' \
            ':(exclude)**/*.test.js' \
            ':(exclude)**/*.test.jsx' \
            ':(exclude)**/*.spec.ts' \
            ':(exclude)**/*.spec.tsx' \
            ':(exclude)**/*.spec.js' \
            ':(exclude)**/*.spec.jsx' \
            ':(exclude)**/*.stories.ts' \
            ':(exclude)**/*.stories.tsx' \
            ':(exclude)**/conftest.py' \
            > "$DIFF_FILE" || true
          if [ ! -s "$DIFF_FILE" ]; then
            echo "skip_scan=true" >> "$GITHUB_OUTPUT"
            echo "No relevant diff."
          else
            echo "skip_scan=false" >> "$GITHUB_OUTPUT"
            wc -c "$DIFF_FILE"
          fi

      # 4) overrides マージ
      #    base    = .llm-security-scan/perspectives + triage_prompts.yml
      #    overlay = caller の ${{ inputs.overrides_path }}/perspectives, /triage_prompts.yml
      #    perspectives_disabled の id は enabled: false に書き換え
      - name: Merge overrides
        if: steps.diff.outputs.skip_scan != 'true'
        env:
          OVERRIDES:    ${{ inputs.overrides_path }}
          DISABLED:     ${{ inputs.perspectives_disabled }}
          CONTEXT_PATH: ${{ inputs.context_path }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/scan/perspectives
          cp .llm-security-scan/perspectives/*.yml /tmp/scan/perspectives/
          cp .llm-security-scan/triage_prompts.yml /tmp/scan/triage_prompts.yml
          if [ -n "$OVERRIDES" ] && [ -d "$OVERRIDES/perspectives" ]; then
            cp "$OVERRIDES"/perspectives/*.yml /tmp/scan/perspectives/ 2>/dev/null || true
          fi
          if [ -n "$OVERRIDES" ] && [ -f "$OVERRIDES/triage_prompts.yml" ]; then
            cp "$OVERRIDES/triage_prompts.yml" /tmp/scan/triage_prompts.yml
          fi
          # perspectives_disabled (CSV) を enabled:false に書き換え
          if [ -n "$DISABLED" ]; then
            IFS=',' read -ra IDS <<< "$DISABLED"
            for id in "${IDS[@]}"; do
              id="$(echo "$id" | xargs)"
              [ -z "$id" ] && continue
              f="/tmp/scan/perspectives/${id}.yml"
              [ -f "$f" ] && sed -i 's/^enabled:.*$/enabled: false/' "$f"
            done
          fi
          # triage.py は src/ の親 (= .llm-security-scan/) を探しに行くので
          # マージ後の triage_prompts.yml をそこへ反映する
          cp /tmp/scan/triage_prompts.yml .llm-security-scan/triage_prompts.yml

          # SECURITY-CONTEXT を /tmp/scan/context.md に確定。
          # 優先順:
          #   1) inputs.context_path で明示指定されたファイル
          #   2) overrides_path/SECURITY-CONTEXT.md (規約 fallback)
          #   3) 何もない → 空ファイル (engine.py 側で no-op 扱い)
          : > /tmp/scan/context.md
          if [ -n "$CONTEXT_PATH" ] && [ -f "$CONTEXT_PATH" ]; then
            cp "$CONTEXT_PATH" /tmp/scan/context.md
            echo "[context] using $CONTEXT_PATH ($(wc -c < /tmp/scan/context.md) bytes)"
          elif [ -n "$OVERRIDES" ] && [ -f "$OVERRIDES/SECURITY-CONTEXT.md" ]; then
            cp "$OVERRIDES/SECURITY-CONTEXT.md" /tmp/scan/context.md
            echo "[context] using $OVERRIDES/SECURITY-CONTEXT.md ($(wc -c < /tmp/scan/context.md) bytes)"
          else
            echo "[context] no SECURITY-CONTEXT.md provided (no-op)"
          fi

      # 5) provider 検出 (OpenAI > Vertex > Gemini)
      - name: Detect provider
        id: detect
        if: steps.diff.outputs.skip_scan != 'true'
        env:
          HAS_OPENAI:  ${{ secrets.OPENAI_API_KEY != '' }}
          HAS_GCP_SA:  ${{ secrets.GCP_SA_KEY     != '' }}
          HAS_GEMINI:  ${{ secrets.GEMINI_API_KEY != '' }}
        run: |
          if   [ "$HAS_OPENAI" = "true" ]; then echo "provider=openai" >> "$GITHUB_OUTPUT"
          elif [ "$HAS_GCP_SA" = "true" ]; then echo "provider=vertex" >> "$GITHUB_OUTPUT"
          elif [ "$HAS_GEMINI" = "true" ]; then echo "provider=gemini" >> "$GITHUB_OUTPUT"
          else
            echo "provider=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to GCP (Vertex AI)
        if: steps.detect.outputs.provider == 'vertex'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install dependencies
        if: steps.diff.outputs.skip_scan != 'true' && steps.detect.outputs.provider != 'none'
        run: |
          pip install --quiet \
            'openai>=1.50' \
            'google-cloud-aiplatform>=1.71' \
            'google-generativeai>=0.8' \
            pyyaml

      # 6) スキャン実行
      - name: Run scan
        if: steps.diff.outputs.skip_scan != 'true' && steps.detect.outputs.provider != 'none'
        env:
          LLM_PROVIDER:          ${{ steps.detect.outputs.provider }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CLOUD_PROJECT:  ${{ vars.GCP_PROJECT  || 'CHANGE_ME' }}
          GOOGLE_CLOUD_LOCATION: ${{ vars.GCP_LOCATION || 'us-central1' }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          LLM_MODEL:             ${{ vars.LLM_MODEL || 'gpt-4o-mini' }}
          TRIAGE_ENABLED:        ${{ inputs.triage_enabled }}
          MAX_LOW:               ${{ inputs.max_low_per_perspective }}
          DEBATE_ROUNDS:         ${{ inputs.debate_rounds }}
        run: |
          ARGS=()
          if [ "$TRIAGE_ENABLED" != "true" ]; then ARGS+=(--no-triage); fi
          python3 .llm-security-scan/src/engine.py \
            --diff /tmp/scan/diff.patch \
            --output /tmp/scan/report.md \
            --perspectives-dir /tmp/scan/perspectives \
            --context /tmp/scan/context.md \
            --max-low-per-perspective "$MAX_LOW" \
            --debate-rounds "$DEBATE_ROUNDS" \
            "${ARGS[@]}"
          echo "── report ──────────────────────────────────────"
          cat /tmp/scan/report.md

      # 認証情報が一つも無いケースの可視化
      - name: No provider configured
        if: steps.diff.outputs.skip_scan != 'true' && steps.detect.outputs.provider == 'none'
        run: |
          mkdir -p /tmp/scan
          cat > /tmp/scan/report.md <<'EOF'
          # 🛡️ LLM Security Scan

          ⚠️ **LLM の認証情報が設定されていません**。

          以下のいずれかを caller リポジトリの Secrets に登録してください:
          - `OPENAI_API_KEY`（推奨）
          - `GCP_SA_KEY`（Vertex AI 用 SA JSON）
          - `GEMINI_API_KEY`（Generative Language API）
          EOF

      - name: Post sticky comment
        if: steps.diff.outputs.skip_scan != 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: llm-security-scan
          path:   /tmp/scan/report.md
