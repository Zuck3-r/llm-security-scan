id: secrets
name: 秘匿情報の混入 / 漏洩
enabled: true
severity_weight: Critical

# code_safe_patterns:
# 環境変数 / Settings オブジェクト / Secrets Manager 経由での参照は安全側として扱う。
# 高エントロピー文字列リテラルでも、test fixture は file filter で既に除外されているため、
# ここでは production code の lookup ロジックのみ書く。
code_safe_patterns:
  - "os\\.environ"                          # 環境変数経由 (Python)
  - "os\\.getenv"
  - "process\\.env\\."                      # 環境変数経由 (Node)
  - "settings\\.[A-Za-z_]+"                 # Pydantic Settings / Django settings 経由
  - "Settings\\(\\)\\."                     # Pydantic Settings 直接
  - "secrets\\.[A-Z_]+"                     # GitHub Actions secrets
  - "ENV\\[\""                              # Ruby ENV["..."]
  - "getenv\\("                             # 一般的

prompt:
  detect_patterns: |
    1. ハードコードされた秘匿情報
       - API キー / トークン / パスワード / 秘密鍵を文字列リテラルで埋め込み
       - 例: OPENAI_API_KEY="sk-...", GEMINI_API_KEY="AIza...", AWS_SECRET_ACCESS_KEY=, クラウドサービスアカウント JSON (例: GCP / AWS / Azure)
       - JWT を文字列リテラルで埋め込み（test fixture を除く）
       - PEM 形式の private key (BEGIN RSA PRIVATE KEY 等) をソースに直書き
    2. ログ出力経由の漏洩
       - logger.info / print / console.log に Authorization ヘッダ・パスワード・カード番号・トークンを生で渡す
       - エラーメッセージで request body / cookie をそのまま含める
       - スタックトレースに環境変数を埋め込む
    3. 設定ファイルへの埋め込み
       - .env / config に値を直接書き、git で追跡されている（gitignore で守られていない）
       - 公開リポジトリの README にサンプルとして書いた値が本物
    4. クライアント側流出
       - VITE_* / NEXT_PUBLIC_* / REACT_APP_* / EXPO_PUBLIC_* 等のクライアント露出 prefix に「サーバ側のみで使うべき」キーが入っている
       - frontend のビルドバンドルに含まれる文字列リテラル

  safe_patterns: |
    以下は検出しない:
    - os.environ / os.getenv / process.env.X / settings.X / Settings() 経由の参照
    - GitHub Actions の ${{ secrets.X }} 経由の参照
    - 明らかな placeholder（"your-api-key-here", "<REPLACE_ME>", "xxx", "..."）
    - test fixture（既に file filter で除外されているはず）
    - cloud-native Secret Manager (AWS Secrets Manager, GCP Secret Manager, Vault 等) からの取得経路

  output_schema: |
    以下のJSON形式で出力してください。findings が空なら問題なしです。
    JSONのみを出力し、コードフェンス（```）や説明文を付けないでください。
    {
      "findings": [
        {
          "file": "ファイルパス（diffヘッダーから取得）",
          "line": "行番号または該当箇所の説明",
          "severity": "Critical|High|Medium|Low",
          "title": "問題の簡潔なタイトル",
          "detail": "何が問題で、どう攻撃されうるか",
          "fix": "具体的な修正案"
        }
      ],
      "summary": "この観点での全体的な評価（1-2文）"
    }
